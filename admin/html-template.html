<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>{{TITLE}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    // IIFE 格式：组件和 React 都打包在一个文件中
    // window.UserComponent 包含 { default: Component, React, ReactDOM }
    function renderApp() {
      const UC = window.UserComponent;
      if (UC && UC.React && UC.ReactDOM && (UC.default || UC.Component)) {
        const Component = UC.default || UC.Component;
        UC.ReactDOM.createRoot(document.getElementById('root')).render(
          UC.React.createElement(Component)
        );
      } else {
        setTimeout(renderApp, 50);
      }
    }
    
    // 加载组件脚本
    var script = document.createElement('script');
    script.src = '{{ENTRY}}';
    script.onload = renderApp;
    script.onerror = function() {
      document.getElementById('root').innerHTML = '<pre style="padding:20px;color:red">Failed to load component</pre>';
    };
    document.body.appendChild(script);
  </script>
</body>

</html>
