<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>{{TITLE}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- 加载组件 JS（IIFE 格式，会挂载 UserComponent 到 window） -->
  <script src="{{ENTRY}}"></script>

  <script>
    // 等待组件加载完成
    function waitForReady() {
      if (window.UserComponent) {
        var UC = window.UserComponent;
        var React = UC.React;
        var ReactDOM = UC.ReactDOM;
        var Component = UC.Component || UC.default;
        
        if (React && ReactDOM && Component) {
          ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Component));
          return;
        }
      }
      setTimeout(waitForReady, 10);
    }
    waitForReady();
  </script>
</body>

</html>
